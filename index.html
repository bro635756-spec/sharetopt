<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShareTopt PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0f1a;
color:white;
font-family:'Plus Jakarta Sans',sans-serif;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111827;
}

.container{
max-width:500px;
margin:auto;
padding-bottom:90px;
}

.card{
background:#111827;
padding:20px;
margin:15px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
background:#0b0f1a;
border:1px solid #222;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#8b5cf6;
border:none;
color:white;
border-radius:10px;
font-weight:bold;
}

.chat-item{
padding:15px;
border-bottom:1px solid #222;
cursor:pointer;
}

.msg{
padding:10px 14px;
border-radius:15px;
max-width:70%;
margin:6px;
}

.sent{
background:#8b5cf6;
margin-left:auto;
}

.received{
background:#1f2937;
}

nav{
position:fixed;
bottom:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px;
}

.hidden{
display:none;
}

.story{
display:inline-block;
width:60px;
height:60px;
border-radius:50%;
border:3px solid #8b5cf6;
margin-right:10px;
}

.typing{
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<header>

<div>ShareTopt</div>

<div onclick="openCommunity()">🌍</div>

</header>


<div class="container">

<!-- AUTH -->

<div id="auth-box" class="card">

<input id="email" placeholder="email">

<input id="pass" type="password" placeholder="password">

<button id="auth-btn">Giriş / Kayıt</button>

</div>


<!-- STORY -->

<div id="story-bar" style="overflow:auto;white-space:nowrap;padding:10px"></div>


<!-- CHAT LIST -->

<div id="chat-list"></div>


<!-- COMMUNITY -->

<div id="community" class="hidden card">

<h3>Topluluk</h3>

<div id="posts"></div>

<input id="post-input" placeholder="Bir şey paylaş">

<button onclick="sharePost()">Paylaş</button>

</div>


</div>


<!-- CHAT -->

<div id="chat-screen" class="hidden">

<header>

<span id="chat-name"></span>

<span onclick="closeChat()">X</span>

</header>

<div id="chat-messages" style="height:60vh;overflow:auto"></div>

<div class="typing" id="typing"></div>

<div style="display:flex">

<input id="msg">

<button onclick="sendMsg()">➤</button>

</div>

</div>


<nav>

<div onclick="showChats()">💬</div>

<div onclick="showProfile()">👤</div>

</nav>



<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"

import {getDatabase,ref,set,onValue,push,remove,query,orderByChild,equalTo,get} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js"

import {getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"



const firebaseConfig={

apiKey:"AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",

authDomain:"share-your-thoughts-e15a7.firebaseapp.com",

databaseURL:"https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"share-your-thoughts-e15a7"

}



const app=initializeApp(firebaseConfig)

const db=getDatabase(app)

const auth=getAuth(app)



let myData=null
let activeFriend=null



function genID(){

return "SJ-"+Math.random().toString(36).substring(2,12)

}



document.getElementById("auth-btn").onclick=async()=>{

const e=email.value
const p=pass.value

try{

await signInWithEmailAndPassword(auth,e,p)

}catch{

const res=await createUserWithEmailAndPassword(auth,e,p)

const id=genID()

await set(ref(db,"users/"+res.user.uid),{

name:"Yeni",

customId:id

})

}

}



onAuthStateChanged(auth,user=>{

if(!user)return

set(ref(db,"online/"+user.uid),true)

onValue(ref(db,"users/"+user.uid),s=>{

myData=s.val()

})

loadFriends()

loadStories()

loadPosts()

})



function loadFriends(){

onValue(ref(db,"users"),snap=>{

chat-list.innerHTML=""

snap.forEach(c=>{

const d=c.val()

if(d.customId===myData.customId)return

const div=document.createElement("div")

div.className="chat-item"

div.innerText=d.name

div.onclick=()=>openChat(d)

chat-list.appendChild(div)

})

})

}



function openChat(friend){

activeFriend=friend

chat-name.innerText=friend.name

chat-screen.classList.remove("hidden")



const room=[myData.customId,friend.customId].sort().join("_")



onValue(ref(db,"chats/"+room),snap=>{

chat-messages.innerHTML=""

snap.forEach(c=>{

const m=c.val()

const div=document.createElement("div")

div.className="msg "+(m.sender===myData.customId?"sent":"received")

div.innerText=m.text

div.onclick=()=>{

if(m.sender===myData.customId){

remove(ref(db,"chats/"+room+"/"+c.key))

}

}

chat-messages.appendChild(div)

})

})

}



function sendMsg(){

const t=msg.value

if(!t)return



const room=[myData.customId,activeFriend.customId].sort().join("_")



push(ref(db,"chats/"+room),{

sender:myData.customId,

text:t

})



msg.value=""



set(ref(db,"typing/"+room),myData.name)



setTimeout(()=>{

remove(ref(db,"typing/"+room))

},2000)

}



function loadPosts(){

onValue(ref(db,"community"),snap=>{

posts.innerHTML=""

snap.forEach(c=>{

const d=c.val()

const div=document.createElement("div")

div.innerText=d.user+" : "+d.text

posts.appendChild(div)

})

})

}



function sharePost(){

push(ref(db,"community"),{

user:myData.name,

text:post-input.value

})

post-input.value=""

}



function loadStories(){

onValue(ref(db,"stories"),snap=>{

story-bar.innerHTML=""

snap.forEach(c=>{

const d=c.val()

const img=document.createElement("div")

img.className="story"

img.onclick=()=>alert(d.text)

story-bar.appendChild(img)

})

})

}



function openCommunity(){

community.classList.toggle("hidden")

}



function showChats(){

community.classList.add("hidden")

}



function showProfile(){

alert("profil ekranı geliştirilebilir")

}



</script>

</body>
    </html>
