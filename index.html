<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareTopt Pro v18</title>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
  authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
  databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "share-your-thoughts-e15a7",
  storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
  messagingSenderId: "137665399298",
  appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;

// Auth State
onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    document.getElementById("user-email").innerText=user.email;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadIdeas();
    loadFriends();
  }else{
    currentUser=null;
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// Register
window.register=async()=>{
  const email=document.getElementById("reg-email").value;
  const pass=document.getElementById("reg-pass").value;
  if(!email||!pass) return alert("Email ve şifre girin");
  try{
    const res=await createUserWithEmailAndPassword(auth,email,pass);
    const uid="sj-"+Math.random().toString(36).substring(2,10)+"_v18-"+Date.now();
    set(ref(db,"users/"+res.user.uid),{email:email,userId:uid});
    alert("Kayıt başarılı! ID: "+uid);
  }catch(e){alert(e.message);}
}

// Login
window.login=async()=>{
  const email=document.getElementById("login-email").value;
  const pass=document.getElementById("login-pass").value;
  if(!email||!pass) return alert("Email ve şifre girin");
  try{await signInWithEmailAndPassword(auth,email,pass);}catch(e){alert(e.message);}
}

// Add Idea
window.addIdea=()=>{
  const txt=document.getElementById("idea-input").value.trim();
  if(!txt||!currentUser) return;
  const newRef=push(ref(db,"ideas"));
  set(newRef,{
    text:txt,
    author:currentUser.email,
    timestamp:Date.now()
  });
  document.getElementById("idea-input").value="";
}

// Delete Idea
window.deleteIdea=id=>{
  if(confirm("Bu fikri silmek istediğine emin misin?")){
    remove(ref(db,"ideas/"+id));
  }
}

// Load Ideas
function loadIdeas(){
  onValue(ref(db,"ideas"),snap=>{
    const container=document.getElementById("ideas-container");
    container.innerHTML="";
    snap.forEach(child=>{
      const data=child.val();
      const div=document.createElement("div");
      div.className="idea-card";
      div.innerHTML=`
      <p>${data.text}</p>
      <small>${data.author}</small>
      <button onclick="deleteIdea('${child.key}')">Sil</button>
      `;
      container.appendChild(div);
    });
  });
}

// Add Friend
window.addFriend=()=>{
  const fEmail=document.getElementById("friend-input").value.trim();
  if(!fEmail||!currentUser) return;
  set(ref(db,"friends/"+currentUser.uid+"/"+fEmail),{email:fEmail});
  document.getElementById("friend-input").value="";
  loadFriends();
}

// Load Friends
function loadFriends(){
  const list=document.getElementById("friends-list");
  list.innerHTML="";
  onValue(ref(db,"friends/"+currentUser.uid),snap=>{
    snap.forEach(child=>{
      const li=document.createElement("li");
      li.textContent=child.val().email;
      list.appendChild(li);
    });
  });
}
</script>

<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#facc15;--text:#e2e8f0;--radius:12px;--transition:0.3s;}
body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--card);border-bottom:1px solid #475569;border-radius:var(--radius);}
.hamburger{font-size:1.5em;cursor:pointer;}
.nav-menu{display:none;position:absolute;top:60px;right:10px;background:var(--card);flex-direction:column;width:220px;border-radius:var(--radius);box-shadow:0 4px 15px rgba(0,0,0,0.25);}
.nav-menu.show{display:flex;}
.nav-menu a{padding:12px;display:block;color:var(--text);text-decoration:none;}
.nav-menu a:hover{background:var(--accent);color:#0f172a;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.banner{background:var(--card);height:180px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:1.5em;}
input,textarea{width:100%;padding:12px;margin-bottom:10px;background:var(--bg);border:1px solid #475569;border-radius:8px;color:var(--text);}
input:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(250,204,21,0.3);}
button{background:var(--accent);color:#0f172a;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;transition:var(--transition);}
button:hover{background:#eab308;transform:translateY(-2px);box-shadow:0 4px 12px rgba(250,204,21,0.3);}
.idea-card{background:var(--card);padding:15px;margin-bottom:12px;border-radius:var(--radius);box-shadow:0 4px 15px rgba(0,0,0,0.25);transition:var(--transition);}
.idea-card:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.help{background:var(--card);border-left:5px solid var(--accent);padding:20px;margin:20px 0;border-radius:var(--radius);}
@media(max-width:768px){.nav-menu{width:180px;}}
</style>

</head>
<body>
<header>
  <div>ShareTopt Pro v18</div>
  <div class="hamburger" onclick="document.querySelector('.nav-menu').classList.toggle('show')">☰</div>
  <nav class="nav-menu">
    <a href="#ideas-container">Fikirler</a>
    <a href="#friends-section">Arkadaşlar</a>
    <a href="#help-section">Yardım</a>
  </nav>
</header>

<div class="container">
  <div id="auth">
    <h2>Kayıt / Giriş</h2>
    <input type="email" id="reg-email" placeholder="Email">
    <input type="password" id="reg-pass" placeholder="Şifre">
    <button onclick="register()">Kayıt Ol</button>
    <hr>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-pass" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>
  </div>

  <div id="app" style="display:none;">
    <div class="banner">Fikirlerinizi Paylaşın</div>

    <input type="text" id="idea-input" placeholder="Fikrinizi yazın">
    <button onclick="addIdea()">Fikri Ekle</button>
    <div id="ideas-container"></div>

    <section id="friends-section">
      <h3>Arkadaş Ekle</h3>
      <input type="email" id="friend-input" placeholder="Email girin">
      <button onclick="addFriend()">Ekle</button>
      <ul id="friends-list"></ul>
    </section>

    <section class="help" id="help-section">
      <h3>Yardım / Öğretici</h3>
      <p>Fikir eklemek için yazıp "Fikri Ekle" butonuna basın.</p>
      <p>Arkadaş eklemek için email girip "Ekle" butonuna tıklayın.</p>
      <p>Fikirleri silmek için "Sil" butonuna basın.</p>
    </section>
  </div>
</div>
</body>
  </html>
