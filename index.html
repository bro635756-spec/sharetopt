<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareTopt Pro v18 - ID System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0a0f18;
            --card: #141b2d;
            --accent: #8b5cf6;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: #1e293b;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); line-height: 1.5; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        /* Sidebar & Overlay */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; border-left: 1px solid var(--border);
        }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        .overlay.active { display: block; }
        .sidebar a { display: block; color: var(--text-dim); text-decoration: none; padding: 15px 0; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .sidebar a:hover { color: var(--accent); padding-left: 10px; }

        /* Header */
        header {
            position: sticky; top: 0; z-index: 100; padding: 1rem 5%;
            background: rgba(10, 15, 24, 0.8); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 700; font-size: 1.3rem; color: var(--accent); letter-spacing: -1px; }

        /* Layout */
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* Auth UI */
        #auth-container { max-width: 400px; margin: 100px auto; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #070b14; border: 1px solid var(--border); border-radius: 10px; color: white; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .switch-btn { margin-top: 15px; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; }

        /* Chat UI */
        .chat-box { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin: 15px 0; padding: 15px; background: #070b14; border-radius: 10px; }
        .msg { padding: 12px 16px; border-radius: 16px; max-width: 85%; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--border); color: white; border-bottom-left-radius: 2px; }
        .msg-info { display: block; font-size: 0.65rem; margin-top: 5px; opacity: 0.7; font-family: 'JetBrains Mono'; }

        .id-badge { background: #1e293b; padding: 4px 10px; border-radius: 6px; color: var(--accent); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<header>
    <div class="logo">SHARETOPT PRO</div>
    <div id="id-display" class="mono hidden"></div>
    <div style="cursor:pointer; font-size: 1.5rem;" id="menu-trigger">☰</div>
</header>

<nav class="sidebar" id="sidebar">
    <div style="margin-bottom: 30px;">
        <h4 style="color: var(--text-dim);">Profilim</h4>
        <div id="my-full-id" class="mono" style="font-size: 0.7rem; margin-top: 5px; word-break: break-all;"></div>
    </div>
    <a href="#app"><i class="fas fa-comment"></i> Chat</a>
    <a href="#friends"><i class="fas fa-user-friends"></i> Arkadaşlar</a>
    <a href="#" id="logout-btn" style="color: #f87171;"><i class="fas fa-power-off"></i> Çıkış</a>
</nav>

<div class="container">
    <div id="auth-container" class="glass-card">
        <h2 id="auth-title">Giriş Yap</h2>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="pass" placeholder="Şifre">
        <button id="auth-submit">Giriş Yap</button>
        <div class="switch-btn" id="auth-toggle">Hesabın yok mu? Kayıt Ol</div>
    </div>

    <div id="app" class="hidden">
        <div class="glass-card">
            <h3>Genel Sohbet</h3>
            <div class="chat-box" id="chat-box"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="chat-input" placeholder="Mesaj gönder...">
                <button id="chat-send" style="width: 60px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="friends" class="glass-card">
            <h3>ID ile Arkadaş Ekle</h3>
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <input type="text" id="friend-id-input" placeholder="sjst-102_xxxxx...">
                <button id="friend-add-btn" style="width: 80px;">Ekle</button>
            </div>
            <div id="friends-list" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, serverTimestamp, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    messagingSenderId: "137665399298",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let isLogin = true;
let userCustomId = "";

// Generate Custom ID: sjst-102_xxxxx-vx2972xxxx
const generateProId = () => {
    const part1 = Math.random().toString(36).substring(2, 7);
    const part2 = Math.random().toString(36).substring(2, 12);
    return `sjst-102_${part1}-vx2972${part2}`;
};

// UI Toggles
const side = document.getElementById('sidebar');
const over = document.getElementById('overlay');
document.getElementById('menu-trigger').onclick = () => { side.classList.add('active'); over.classList.add('active'); };
over.onclick = () => { side.classList.remove('active'); over.classList.remove('active'); };

// Auth Controller
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const snapshot = await get(ref(db, `users/${user.uid}`));
        userCustomId = snapshot.val()?.customId || "Bilinmiyor";
        
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('id-display').classList.remove('hidden');
        document.getElementById('id-display').innerHTML = `<span class="id-badge">${userCustomId.substring(0,12)}...</span>`;
        document.getElementById('my-full-id').innerText = userCustomId;
        
        initApp();
    } else {
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        document.getElementById('id-display').classList.add('hidden');
    }
});

document.getElementById('auth-submit').onclick = async () => {
    const mail = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    try {
        if(isLogin) await signInWithEmailAndPassword(auth, mail, pass);
        else {
            const res = await createUserWithEmailAndPassword(auth, mail, pass);
            const newId = generateProId();
            await set(ref(db, `users/${res.user.uid}`), { customId: newId, email: mail });
            alert("Kayıt Başarılı! ID'niz: " + newId);
        }
    } catch(e) { alert(e.message); }
};

document.getElementById('auth-toggle').onclick = () => {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
    document.getElementById('auth-submit').innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
    document.getElementById('auth-toggle').innerText = isLogin ? "Hesabın yok mu? Kayıt Ol" : "Zaten üye misin? Giriş Yap";
};

document.getElementById('logout-btn').onclick = () => signOut(auth);

// App Logic
function initApp() {
    // Chat
    onValue(ref(db, "chats"), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const me = d.senderId === userCustomId;
            const div = document.createElement('div');
            div.className = `msg ${me ? 'sent' : 'received'}`;
            div.innerHTML = `${d.text}<span class="msg-info">${me ? 'Siz' : d.senderId.substring(0,8)}</span>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // Friends List
    onValue(ref(db, `friends/${auth.currentUser.uid}`), (snap) => {
        const list = document.getElementById('friends-list');
        list.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const item = document.createElement('div');
            item.className = "mono";
            item.style = "padding: 10px; border-bottom: 1px solid #1e293b; color: #94a3b8; font-size: 0.8rem;";
            item.innerHTML = `<i class="fas fa-link"></i> ${d.friendId}`;
            list.appendChild(item);
        });
    });
}

document.getElementById('chat-send').onclick = () => {
    const txt = document.getElementById('chat-input').value;
    if(!txt) return;
    push(ref(db, "chats"), {
        text: txt,
        senderId: userCustomId,
        time: serverTimestamp()
    });
    document.getElementById('chat-input').value = "";
};

document.getElementById('friend-add-btn').onclick = async () => {
    const fId = document.getElementById('friend-id-input').value.trim();
    if(!fId) return;
    
    // Arkadaşın ID'sinin sistemde olup olmadığını kontrol et
    const usersRef = ref(db, 'users');
    const q = query(usersRef, orderByChild('customId'), equalTo(fId));
    const snap = await get(q);
    
    if(snap.exists()) {
        await set(ref(db, `friends/${auth.currentUser.uid}/${fId.replace(/[^a-zA-Z0-9]/g, '')}`), {
            friendId: fId,
            addedAt: serverTimestamp()
        });
        alert("Arkadaş eklendi!");
        document.getElementById('friend-id-input').value = "";
    } else {
        alert("Bu ID'ye sahip bir kullanıcı bulunamadı!");
    }
};
</script>
</body>
            </html>
