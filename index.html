<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareTopt</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    messagingSenderId: "137665399298",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.login = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("user-info").innerText = "Merhaba, " + user.displayName;
    } catch (error) {
      alert("Giriş hatası: " + error.message);
    }
  }

  window.addIdea = function() {
    const input = document.getElementById("idea-input");
    const ideaText = input.value.trim();
    if (!ideaText) return;
    const ideasRef = ref(db, "ideas");
    const newIdeaRef = push(ideasRef);
    set(newIdeaRef, {
      text: ideaText,
      timestamp: Date.now()
    });
    input.value = "";
  }

  function renderIdeas() {
    const ideasRef = ref(db, "ideas");
    onValue(ideasRef, (snapshot) => {
      const container = document.getElementById("ideas-container");
      container.innerHTML = "";
      snapshot.forEach((childSnapshot) => {
        const data = childSnapshot.val();
        const id = childSnapshot.key;
        const div = document.createElement("div");
        div.className = "idea-card";
        div.innerHTML = `
          <p>${data.text}</p>
          <button onclick="deleteIdea('${id}')">Sil</button>
        `;
        container.appendChild(div);
      });
    });
  }

  window.deleteIdea = function(id) {
    if(confirm("Bu fikri silmek istediğine emin misin?")) {
      remove(ref(db, "ideas/" + id));
    }
  }

  window.onload = renderIdeas;
</script>

<style>
:root {
  --bg-color: #0f172a;
  --card-bg: #1e293b;
  --accent-yellow: #facc15;
  --text-main: #e2e8f0;
  --text-muted: #94a3b8;
  --border-radius: 12px;
  --transition: all 0.3s ease;
  --shadow-default: 0 4px 15px rgba(0,0,0,0.25);
  --shadow-hover: 0 10px 30px rgba(0,0,0,0.4);
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 20px;
  background-color: var(--bg-color);
  color: var(--text-main);
  line-height: 1.6;
}

.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

.banner-area {
  background-color: var(--card-bg);
  height: 200px;
  border-radius: var(--border-radius);
  margin-bottom: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.5em;
  color: var(--accent-yellow);
  box-shadow: var(--shadow-default);
  text-align: center;
  overflow: hidden;
}

.idea-card {
  background-color: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-default);
  transition: transform var(--transition), box-shadow var(--transition);
  cursor: pointer;
}

.idea-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: var(--shadow-hover);
}

h1,h2,h3 { color: var(--accent-yellow); margin-top:0; margin-bottom:15px; font-weight:600; }
h1 { font-size:2.5em; }
h2 { font-size:2em; }
h3 { font-size:1.75em; }

input, textarea {
  width:100%; padding:12px; margin-bottom:15px;
  background-color: var(--bg-color); border:1px solid #475569;
  border-radius:8px; color: var(--text-main);
}

input:focus, textarea:focus {
  border-color: var(--accent-yellow);
  box-shadow: 0 0 0 3px rgba(250,204,21,0.3);
  outline:none;
}

button {
  background-color: var(--accent-yellow);
  color: #0f172a;
  padding:12px 24px;
  border-radius:8px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition: var(--transition);
}

button:hover {
  background-color: #eab308;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(250,204,21,0.3);
}

.help-section {
  background-color: var(--card-bg);
  border-radius:12px;
  padding:30px;
  margin-top:30px;
  margin-bottom:30px;
  box-shadow: var(--shadow-default);
  border-left:5px solid var(--accent-yellow);
}

.help-section h2 { color: var(--accent-yellow); margin-bottom:20px; }
.help-section p { font-size:1.1em; color: var(--text-muted); }

@media(max-width:768px){
  body { padding:15px; }
  h1{font-size:2em;} h2{font-size:1.75em;} h3{font-size:1.5em;}
  button { width:100%; padding:15px; font-size:1.1em;}
  .banner-area{height:150px; font-size:1.2em;}
}
</style>
</head>

<body>
<div class="container">
  <header>
    <h1>ShareTopt</h1>
    <div id="user-info"></div>
    <button id="login-btn" onclick="login()">Google ile Giriş</button>
  </header>

  <section class="banner-area">Paylaşmak istediğin fikirleri ekle!</section>

  <section class="idea-input">
    <input type="text" id="idea-input" placeholder="Fikrinizi yazın...">
    <button onclick="addIdea()">Fikri Ekle</button>
  </section>

  <section class="help-section">
    <h2>Yardım / Öğretici</h2>
    <p>Fikrinizi eklemek için yukarıdaki kutuya yazın ve "Fikri Ekle" butonuna tıklayın. Daha sonra fikirler aşağıda görünecek.</p>
    <p>Fikirleri silmek için fikir kutusundaki "Sil" butonuna basın.</p>
  </section>

  <section class="idea-grid" id="ideas-container"></section>
</div>
</body>
</html>
