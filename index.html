<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareTopt Pro v18 - Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05080f; --card: #111827; --accent: #6366f1; --border: #1f2937; --text: #f3f4f6; --radius: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Layout */
        header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 8, 15, 0.8); backdrop-filter: blur(10px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .container { max-width: 600px; margin: 20px auto; padding-bottom: 80px; }
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
        
        /* Profile UI */
        .profile-header { text-align: center; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 10px; }
        .mono { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--accent); }
        
        /* DM & Posts */
        .feed-card { overflow: hidden; }
        .feed-img, .feed-vid { width: 100%; border-radius: 12px; margin: 10px 0; max-height: 400px; object-fit: cover; }
        .dm-window { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .dm-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* UI Components */
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; margin: 8px 0; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); }
        .nav-item { color: var(--text); font-size: 1.2rem; cursor: pointer; }
        .hidden { display: none !important; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 0.9rem; }
        .sent { align-self: flex-end; background: var(--accent); }
        .received { align-self: flex-start; background: var(--border); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: var(--accent)">SHARETOPT v18</div>
    <div id="top-id" class="mono"></div>
</header>

<div class="container" id="main-content">
    <div id="auth-section" class="glass">
        <h2 id="auth-title">Giriş</h2>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="pass" placeholder="Şifre">
        <button id="auth-btn" style="width:100%">Giriş Yap</button>
        <p id="toggle-auth" style="text-align:center; font-size:0.8rem; margin-top:15px; cursor:pointer">Hesap Oluştur</p>
    </div>

    <div id="feed-section" class="hidden">
        <div class="glass">
            <input type="text" id="post-text" placeholder="Ne düşünüyorsun?">
            <input type="text" id="media-url" placeholder="Fotoğraf veya Video Linki (URL)">
            <button id="post-btn" style="width:100%">Paylaş</button>
        </div>
        <div id="feed-container"></div>
    </div>

    <div id="profile-section" class="hidden">
        <div class="glass profile-header">
            <img src="https://via.placeholder.com/100" id="profile-view-img" class="p-img">
            <h3 id="profile-view-id">ID</h3>
            <p id="profile-view-bio" style="color:var(--text-dim); font-size:0.9rem"></p>
        </div>
        <div class="glass">
            <h4>Profili Düzenle</h4>
            <input type="text" id="edit-img" placeholder="Profil Fotoğrafı URL">
            <textarea id="edit-bio" placeholder="Hakkımda bir şeyler yaz..."></textarea>
            <button id="save-profile" style="width:100%">Güncelle</button>
        </div>
        <div class="glass">
            <h4>Arkadaş Ekle</h4>
            <input type="text" id="friend-id-input" placeholder="sjst-102_...">
            <button id="add-friend-btn" style="width:100%">Arkadaşı Bul ve Ekle</button>
            <div id="friends-list" style="margin-top:15px"></div>
        </div>
    </div>
</div>

<div id="dm-window" class="dm-window">
    <div class="dm-header">
        <i class="fas fa-arrow-left" id="close-dm" style="cursor:pointer"></i>
        <span id="chat-with-name" class="mono"></span>
    </div>
    <div class="chat-area" id="chat-area"></div>
    <div style="padding:15px; display:flex; gap:10px; border-top:1px solid var(--border)">
        <input type="text" id="dm-input" placeholder="Mesaj yaz...">
        <button id="dm-send"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<nav class="nav-bar hidden" id="nav-bar">
    <div class="nav-item" onclick="showTab('feed')"><i class="fas fa-home"></i></div>
    <div class="nav-item" onclick="showTab('profile')"><i class="fas fa-user"></i></div>
    <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, serverTimestamp, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAFtCQjGACAmoOSEIazC648I1BaLPkT8-U",
    authDomain: "share-your-thoughts-e15a7.firebaseapp.com",
    databaseURL: "https://share-your-thoughts-e15a7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "share-your-thoughts-e15a7",
    storageBucket: "share-your-thoughts-e15a7.firebasestorage.app",
    messagingSenderId: "137665399298",
    appId: "1:137665399298:web:60e7087fc41db2670f751b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let myId = "", activeChatFriendId = "", isLogin = true;

// --- AUTH LİSTENER ---
onAuthStateChanged(auth, async (user) => {
    if(user) {
        const snap = await get(ref(db, `users/${user.uid}`));
        myId = snap.val()?.customId;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');
        document.getElementById('top-id').innerText = myId.substring(0,15)+"...";
        showTab('feed');
        loadProfile();
        loadFeed();
    } else {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('nav-bar').classList.add('hidden');
        document.getElementById('feed-section').classList.add('hidden');
        document.getElementById('profile-section').classList.add('hidden');
    }
});

// --- GİRİŞ / KAYIT ---
document.getElementById('auth-btn').onclick = async () => {
    const e = document.getElementById('email').value, p = document.getElementById('pass').value;
    try {
        if(isLogin) await signInWithEmailAndPassword(auth, e, p);
        else {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            const cid = `sjst-102_${Math.random().toString(36).substring(2,7)}-vx2972${Date.now().toString().slice(-5)}`;
            await set(ref(db, `users/${res.user.uid}`), { customId: cid, email: e, bio: "Merhaba!", img: "https://via.placeholder.com/100" });
        }
    } catch(err) { alert(err.message); }
};

// --- SEKME YÖNETİMİ ---
window.showTab = (tab) => {
    document.getElementById('feed-section').className = tab === 'feed' ? '' : 'hidden';
    document.getElementById('profile-section').className = tab === 'profile' ? '' : 'hidden';
};

// --- PROFİL SİSTEMİ ---
async function loadProfile() {
    onValue(ref(db, `users/${auth.currentUser.uid}`), (s) => {
        const d = s.val();
        document.getElementById('profile-view-img').src = d.img;
        document.getElementById('profile-view-id').innerText = d.customId;
        document.getElementById('profile-view-bio').innerText = d.bio;
    });
    // Arkadaş Listesi & DM Başlatma
    onValue(ref(db, `friends/${auth.currentUser.uid}`), (s) => {
        const list = document.getElementById('friends-list');
        list.innerHTML = "<h5>Arkadaşlarım (DM için tıkla)</h5>";
        s.forEach(c => {
            const btn = document.createElement('button');
            btn.style = "margin:5px 0; background:#1f2937; font-size:0.7rem";
            btn.innerText = c.val().friendId;
            btn.onclick = () => openDM(c.val().friendId);
            list.appendChild(btn);
        });
    });
}

document.getElementById('save-profile').onclick = () => {
    set(ref(db, `users/${auth.currentUser.uid}/img`), document.getElementById('edit-img').value || "https://via.placeholder.com/100");
    set(ref(db, `users/${auth.currentUser.uid}/bio`), document.getElementById('edit-bio').value || "");
    alert("Profil Güncellendi!");
};

// --- MEDYA PAYLAŞIM SİSTEMİ ---
document.getElementById('post-btn').onclick = () => {
    const txt = document.getElementById('post-text').value, url = document.getElementById('media-url').value;
    if(!txt && !url) return;
    push(ref(db, "posts"), {
        uid: auth.currentUser.uid,
        authorId: myId,
        text: txt,
        media: url,
        type: url.includes('mp4') ? 'video' : 'image',
        time: serverTimestamp()
    });
    document.getElementById('post-text').value = ""; document.getElementById('media-url').value = "";
};

function loadFeed() {
    onValue(ref(db, "posts"), (s) => {
        const container = document.getElementById('feed-container');
        container.innerHTML = "";
        s.forEach(c => {
            const d = c.val();
            const card = document.createElement('div');
            card.className = "glass feed-card";
            let mediaHtml = "";
            if(d.media) {
                mediaHtml = d.type === 'video' ? `<video src="${d.media}" class="feed-vid" controls></video>` : `<img src="${d.media}" class="feed-img">`;
            }
            card.innerHTML = `<small class="mono">${d.authorId}</small><p>${d.text}</p>${mediaHtml}`;
            container.prepend(card);
        });
    });
}

// --- DM SİSTEMİ (GÜÇLÜ) ---
function openDM(fid) {
    activeChatFriendId = fid;
    document.getElementById('dm-window').style.display = 'flex';
    document.getElementById('chat-with-name').innerText = fid;
    const chatId = [myId, fid].sort().join("_");
    onValue(ref(db, `direct_messages/${chatId}`), (s) => {
        const area = document.getElementById('chat-area');
        area.innerHTML = "";
        s.forEach(c => {
            const m = c.val();
            const div = document.createElement('div');
            div.className = `msg ${m.sender === myId ? 'sent' : 'received'}`;
            div.innerText = m.text;
            area.appendChild(div);
        });
        area.scrollTop = area.scrollHeight;
    });
}

document.getElementById('dm-send').onclick = () => {
    const t = document.getElementById('dm-input').value;
    if(!t) return;
    const chatId = [myId, activeChatFriendId].sort().join("_");
    push(ref(db, `direct_messages/${chatId}`), { sender: myId, text: t, time: serverTimestamp() });
    document.getElementById('dm-input').value = "";
};

document.getElementById('close-dm').onclick = () => document.getElementById('dm-window').style.display = 'none';

// --- ARKADAŞ EKLEME ---
document.getElementById('add-friend-btn').onclick = async () => {
    const fid = document.getElementById('friend-id-input').value;
    const qUser = query(ref(db, "users"), orderByChild("customId"), equalTo(fid));
    const snap = await get(qUser);
    if(snap.exists()) {
        await set(ref(db, `friends/${auth.currentUser.uid}/${fid.replace(/\./g,'_')}`), { friendId: fid });
        alert("Arkadaş eklendi!");
    } else alert("Kullanıcı bulunamadı!");
};

window.logout = () => signOut(auth);
document.getElementById('toggle-auth').onclick = () => {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "Giriş" : "Kayıt";
    document.getElementById('auth-btn').innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
};
</script>
</body>
    </html>
